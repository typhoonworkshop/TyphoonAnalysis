  <script id="589" type="text/x-typescript" pinned="">
    const PUNCT_PAUSE_MS = 700;
    const VOWEL_WEIGHT = 1.5;

    function normalize(token: string): string {
      token = token.trim();
      // Remove any hyphen that is NOT the last character of the token
      token = token.replace(/-(?!$)/g, "");
      return token
        .replace(/_/g,"")
        .replace(/\*\*/g, "")
        // use Unicode escapes to avoid editor silently converting curly quotes to straight ones
        .replace(/[\u201C\u201D\u2018\u2019]/g, "");
    }

    function timeToRead(rawToken: string, lengthOfWhiteSpace: number = 1, factor: number = 1): number {
      const token = normalize(rawToken);
      const base = 33;
      let ttr = base;
      // add up to 3 extra base units for each unit of token length up to length 4
      ttr += base * Math.min(Math.max(token.length - 1, 0), 3);
      const syls = syllables(token).split("/");
      const vowels = token.match(/[aeiouy]/gi);
      const punc = tokenize(token).filter(t => isPunct(t));
      ttr += syls.length * (base * 2);
      if (vowels) ttr += (token.length > 4 ? vowels.length * (base * VOWEL_WEIGHT) : base * VOWEL_WEIGHT);
      if (punc.length) ttr += punc.length * PUNCT_PAUSE_MS;
      ttr += lengthOfWhiteSpace * (base * 2);
      ttr = Math.round(ttr / factor);
      return ttr;
    }
    // the number of millis in one minute is 6000; 45 mins: 270,000
  </script>
  <script id="593" type="text/x-typescript" pinned="">
    function paragraphReadTimes(text: string): { totalMs: number; wordTimes: number[] } {
      const words = text.trim().split(/\s+/);
      const wordTimes: number[] = [];
      for (let i = 0; i < words.length; i++) {
        wordTimes.push(timeToRead(words[i]));
      }
      const totalMs = wordTimes.reduce((sum, t) => sum + t, 0);
      return { totalMs, wordTimes };
    }
  </script>

  <script id="615" type="text/x-typescript">
    // Button to trigger recalculation
    const recalcBtn = display(html`<button style="margin-bottom: 0.75em; padding: 0.4em 1em; cursor: pointer;">
      🔄 Recalculate table
    </button>`);

    const tableContainer = display(html`<div></div>`);

    function formatTtr(ms: number): string {
      const totalSec = Math.round(ms / 1000);
      const mins = Math.floor(totalSec / 60);
      const secs = totalSec % 60;
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    function buildTable() {
      const entries = [];
      for (const [key, value] of Object.entries(typhoon)) {
        const type = key.startsWith("c") ? "chapter" : "paragraph";
        const wordCount = value.text.trim().split(/\s+/).length;
        if (type === "paragraph") {
          typhoon[key].ttr = paragraphReadTimes(typhoon[key].text).totalMs;
        }
        entries.push({
          key,
          type,
          wordCount,
          bf: value.bf ?? null,
          ttr: value.ttr != null ? formatTtr(value.ttr) : null,
          preview: value.text.slice(0, 80).replace(/\*\*/g, "") + (value.text.length > 80 ? "…" : "")
        });
      }
      return entries;
    }

    function render() {
      const entries = buildTable();
      tableContainer.innerHTML = "";
      tableContainer.append(
        html`<p><strong>${entries.length} entries</strong> found in <code>typhoon</code>: <strong>${entries.filter(e => e.type === "chapter").length}</strong> chapters, <strong>${entries.filter(e => e.type === "paragraph").length}</strong> paragraphs</p>`
      );
      tableContainer.append(Inputs.table(entries));
    }

    recalcBtn.addEventListener("click", render);
    render();
  </script>
  <script id="677" type="text/x-typescript">
    // xy chart — redraws when recalcBtn is clicked
    const xyChart = (() => {
      const container = display(html`<div></div>`);

      function buildData() {
        // Collect only paragraph entries (not chapters)
        const entries: {key: string; ttr: number; bf: number | null}[] = [];
        for (const [key, value] of Object.entries(typhoon)) {
          if (!key.startsWith("p")) continue;
          const ttr = value.ttr ?? paragraphReadTimes(value.text).totalMs;
          entries.push({ key, ttr, bf: value.bf ?? null });
        }
        // Sort by paragraph number
        entries.sort((a, b) => {
          const na = parseInt(a.key.slice(1));
          const nb = parseInt(b.key.slice(1));
          return na - nb;
        });
        return entries;
      }

      function draw() {
        const data = buildData();

        // Cumulative x: running total of ttr across all paragraphs
        let cumulative = 0;
        const allPoints: {x: number; bf: number | null; key: string}[] = [];
        for (const d of data) {
          cumulative += d.ttr;
          allPoints.push({ x: cumulative, bf: d.bf, key: d.key });
        }

        // Only plot the line up to the last paragraph with a bf value
        const bfPoints = allPoints.filter(d => d.bf !== null);

        const totalMs = cumulative;

        // Format x-axis ticks as mm:ss
        function fmtMs(ms: number): string {
          const s = Math.round(ms / 1000);
          const m = Math.floor(s / 60);
          const sec = s % 60;
          return `${m}:${String(sec).padStart(2, "0")}`;
        }

        const plot = Plot.plot({
          title: "‘Beaufort Scale’ along Time to Read",
          subtitle: `bf score per paragraph · x-axis spans full text (${fmtMs(totalMs)} estimated reading time)`,
          width: 900,
          height: 320,
          marginLeft: 50,
          marginBottom: 50,
          x: {
            label: "Cumulative reading time (mm:ss) →",
            domain: [0, totalMs],
            tickFormat: (d: number) => fmtMs(d),
            ticks: 10
          },
          y: {
            label: "↑ bf",
            domain: [0, 12],
            grid: true
          },
          marks: [
            // Full x-axis extent shown via a faint rule at y=0
            Plot.ruleY([0], { stroke: "#ccc" }),
            // The bf line, only up to where bf values exist
            Plot.line(bfPoints, {
              x: "x",
              y: "bf",
              stroke: "steelblue",
              strokeWidth: 1.5,
              curve: "monotone-x"
            }),
            // Dots at each bf point
            Plot.dot(bfPoints, {
              x: "x",
              y: "bf",
              fill: "steelblue",
              r: 3,
              tip: true,
              title: (d: {key: string; bf: number}) => `${d.key}  bf: ${d.bf}\n${fmtMs(d.x)}`
            }),
            // Vertical marker showing where bf annotations end
            Plot.ruleX([bfPoints.at(-1)?.x ?? 0], {
              stroke: "#e07",
              strokeDasharray: "4,3",
              strokeWidth: 1
            })
          ]
        });

        container.innerHTML = "";
        container.append(plot);
      }

      // Initial draw
      draw();

      // Redraw when recalcBtn is clicked
      recalcBtn.addEventListener("click", () => {
        // Small delay so the table cell's ttr values are written first
        setTimeout(draw, 50);
      });

      return { draw, container };
    })();

  </script>

    const p=55,b=3,t=`“We have no brass-bound uniforms, but then we are like brothers here,” he wrote. “We all mess together and live like fighting-cocks … All the chaps of the black-squad are as decent as they make that kind, and old Sol, the Chief, is a dry stick. We are good friends. As to our old man, you could not find a quieter skipper. Sometimes you would think he hadn’t sense enough to see anything wrong. And yet it isn’t that. Can’t be. He has been in command for a good few years now. He doesn’t do anything actually foolish, and gets his ship along all right without worrying anybody. I believe he hasn’t brains enough to enjoy kicking up a row. I don’t take advantage of him. I would scorn it. Outside the routine of duty he doesn’t seem to understand more than half of what you tell him. We get a laugh out of this at times; but it is dull, too, to be with a man like this — in the long-run. Old Sol says he hasn’t much conversation. Conversation! O Lord! He never talks. The other day I had been yarning under the bridge with one of the engineers, and he must have heard us. When I came up to take my watch, he steps out of the chart-room and has a good look all round, peeps over at the sidelights, glances at the compass, squints upward at the stars. That’s his regular performance. By-and-by he says: ‘Was that you talking just now in the port alleyway?’ ‘Yes, sir.’ ‘With the third engineer?’ ‘Yes, sir.’ He walks off to starboard, and sits under the dodger on a little campstool of his, and for half an hour perhaps he makes no sound, except that I heard him sneeze once. Then after a while I hear him getting up over there, and he strolls across to port, where I was. ‘I can’t understand what you can find to talk about,’ says he. ‘Two solid hours. I am not blaming you. I see people ashore at it all day long, and then in the evening they sit down and keep at it over the drinks. Must be saying the same things over and over again. I can’t understand.’`,

    // IIFE (Immediately Invoked Function Expression) pattern
    const typhoonSummary = (() => {
      // Private state
      const title = "Typhoon by Joseph Conrad";
      const paragraphs = typhoonArray;
      const totalChars = typhoonGB.length;
      const totalParas = paragraphs.length;

      // Private helpers
      function wordCount(text) {
        return text.trim().split(/\s+/).length;
      }

      function avgWordsPerPara(paras) {
        const total = paras.reduce((sum, p) => sum + wordCount(p), 0);
        return Math.round(total / paras.length);
      }

      function longestParagraph(paras) {
        return paras.reduce((longest, p) =>
          wordCount(p) > wordCount(longest) ? p : longest, paras[0]);
      }

      function shortestParagraph(paras) {
        return paras.reduce((shortest, p) =>
          wordCount(p) < wordCount(shortest) ? p : shortest, paras[0]);
      }

      // Public API — returned object
      return {
        title,
        totalCharacters: totalChars,
        totalParagraphs: totalParas,
        totalWords: paragraphs.reduce((sum, p) => sum + wordCount(p), 0),
        averageWordsPerParagraph: avgWordsPerPara(paragraphs),
        longestParagraph: {
          preview: longestParagraph(paragraphs).slice(0, 120) + "…",
          words: wordCount(longestParagraph(paragraphs))
        },
        shortestParagraph: {
          preview: shortestParagraph(paragraphs).slice(0, 120),
          words: wordCount(shortestParagraph(paragraphs))
        },
        getSection(n) {
          // Returns the nth "chapter" block (Roman numeral markers)
          const romanNumerals = ["I", "II", "III", "IV", "V", "VI"];
          const marker = romanNumerals[n - 1];
          const idx = paragraphs.findIndex(p => p.trim() === marker);
          if (idx === -1) return null;
          const nextIdx = romanNumerals
            .slice(n)
            .reduce((found, r) => {
              if (found !== -1) return found;
              const i = paragraphs.findIndex(p => p.trim() === r);
              return i > idx ? i : -1;
            }, -1);
          return paragraphs.slice(idx + 1, nextIdx === -1 ? undefined : nextIdx);
        }
      };
    })();

    display(typhoonSummary);
  </script>
